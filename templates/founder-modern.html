<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="description" content="{{metaDescription}}">
<title>{{pageTitle}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:{{primary}};--accent:{{accent}};--bg:#080b14;--panel:#101625;--text:#eef4ff;--muted:#9eabc2;--sans:"DM Sans",system-ui,sans-serif;--display:"Bebas Neue",Impact,sans-serif}*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:radial-gradient(circle at 80% 5%,color-mix(in srgb,var(--primary) 25%,transparent),transparent 32rem),var(--bg);color:var(--text);font-family:var(--sans);line-height:1.75;overflow-x:hidden}a{color:inherit}.top{position:fixed;top:14px;left:50%;z-index:10;transform:translateX(-50%);width:min(1120px,calc(100% - 28px));display:flex;justify-content:space-between;padding:.7rem 1rem;border:1px solid rgba(255,255,255,.1);border-radius:999px;background:rgba(8,11,20,.72);backdrop-filter:blur(18px)}.top a{text-decoration:none;font-size:.78rem;font-weight:600;white-space:nowrap}.brand span{color:var(--accent)}
.hero{min-height:100svh;position:relative;display:flex;align-items:flex-end;padding:8rem max(18px,calc((100vw - 1120px)/2)) 6rem;overflow:hidden}.hero-copy{position:relative;z-index:2;max-width:850px}.eyebrow{color:var(--accent);font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase}.hero h1{font-family:var(--display);font-size:clamp(6rem,16vw,14rem);font-weight:400;line-height:.78;letter-spacing:.01em;margin:1.2rem 0}.hero h1 em{display:block;color:var(--primary);font-style:normal}.lede{max-width:620px;color:var(--muted);font-size:1.05rem}.hero-visual{position:absolute;right:5vw;top:13%;width:min(38vw,440px);height:68%;opacity:.5;border:1px solid rgba(255,255,255,.12);border-radius:30px;overflow:hidden;box-shadow:0 0 120px color-mix(in srgb,var(--primary) 18%,transparent)}.hero-visual img{width:100%;height:100%;object-fit:cover;filter:grayscale(.25)}.initials{height:100%;display:grid;place-items:center;font-family:var(--display);font-size:10rem;color:var(--primary)}
.tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.6rem}.tag{padding:.35rem .7rem;border:1px solid rgba(255,255,255,.13);border-radius:4px;color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.1em}.kpis{display:grid;grid-template-columns:repeat(3,1fr);width:min(1120px,calc(100% - 36px));margin:0 auto 5rem;border:1px solid rgba(255,255,255,.1)}.kpi{padding:2rem;border-right:1px solid rgba(255,255,255,.1)}.kpi:last-child{border:0}.kpi strong{display:block;color:var(--accent);font-family:var(--display);font-size:3rem;line-height:1}.kpi span{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.12em}
.article{width:min(920px,calc(100% - 36px));margin:auto;padding-bottom:6rem}.section{padding:clamp(1.5rem,4vw,3.2rem);margin-bottom:1rem;border:1px solid rgba(255,255,255,.09);background:linear-gradient(145deg,rgba(255,255,255,.045),rgba(255,255,255,.015));border-radius:12px}.section-num{color:var(--primary);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase}.section h2{font-family:var(--display);font-size:clamp(2.4rem,6vw,4.2rem);font-weight:400;line-height:1;margin:.6rem 0 1rem}.section p{color:var(--muted);white-space:pre-line}.quote{margin-top:1.2rem;padding:1rem 1.2rem;border-left:3px solid var(--accent);background:rgba(255,255,255,.04);font-style:italic}.footer{text-align:center;padding:3rem;color:var(--muted);font-size:.75rem}
@media(max-width:768px){.hero{min-height:auto;padding-top:8rem}.hero h1{max-width:100%;font-size:clamp(4rem,22vw,8rem);overflow-wrap:anywhere}.lede{overflow-wrap:anywhere}.hero-visual{inset:7rem -20% auto auto;width:75%;height:55%;opacity:.2}.kpis{grid-template-columns:1fr}.kpi,.kpi:last-child{border-right:0;border-bottom:1px solid rgba(255,255,255,.1)}.kpi:last-child{border-bottom:0}}@media(max-width:640px){.top a:last-child{font-size:.68rem}.hero,.kpis,.article{width:calc(100% - 20px)}.hero{padding-inline:0;margin:auto}}
</style>
</head>
<body>
<nav class="top"><a class="brand" href="../index.html">Founder<span>Lens</span></a><a href="../founders.html">Founders</a></nav>
<header class="hero"><div class="hero-copy"><p class="eyebrow">{{eyebrow}}</p><h1>{{name}}<em>{{company}}</em></h1><p class="lede">{{tagline}}. {{summary}}</p><div class="tags">{{tags}}</div></div><div class="hero-visual">{{image}}</div></header>
<section class="kpis">{{kpis}}</section><main class="article">{{sections}}</main><footer class="footer">Generated by FounderLens · Edit the JSON, not this HTML file.</footer>
</body></html>
