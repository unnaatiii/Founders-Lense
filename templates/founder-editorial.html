<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{metaDescription}}">
<title>{{pageTitle}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,600&display=swap" rel="stylesheet">
<style>
:root{--primary:{{primary}};--accent:{{accent}};--ink:#10233f;--muted:#58708f;--paper:#f6faff;--panel:rgba(255,255,255,.7);--serif:"Playfair Display",Georgia,serif;--sans:"DM Sans",system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:radial-gradient(circle at 15% 10%,color-mix(in srgb,var(--accent) 20%,transparent),transparent 30rem),linear-gradient(180deg,#f9fcff,var(--paper));color:var(--ink);font-family:var(--sans);line-height:1.75;overflow-x:hidden}
a{color:inherit}.top{position:fixed;top:14px;left:50%;z-index:10;transform:translateX(-50%);width:min(1080px,calc(100% - 28px));display:flex;justify-content:space-between;align-items:center;padding:.65rem .8rem;border:1px solid color-mix(in srgb,var(--primary) 16%,transparent);border-radius:999px;background:rgba(248,252,255,.78);backdrop-filter:blur(18px);box-shadow:0 16px 50px color-mix(in srgb,var(--primary) 12%,transparent)}
.top a{text-decoration:none;font-size:.78rem;font-weight:600;white-space:nowrap}.brand{font-family:var(--serif);font-size:1rem!important;font-weight:900}.brand span{color:var(--primary)}
.hero{min-height:92svh;display:grid;grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);align-items:center;gap:clamp(2rem,7vw,7rem);width:min(1120px,calc(100% - 36px));margin:auto;padding:8rem 0 5rem}.hero>div{min-width:0;max-width:100%}.eyebrow{color:var(--primary);font-size:.7rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase}.hero h1{font-family:var(--serif);font-size:clamp(3.8rem,8vw,7.5rem);line-height:.9;letter-spacing:-.06em;margin:1rem 0}.hero h1 em{display:block;color:var(--primary);font-weight:600}.lede{max-width:650px;color:var(--muted);font-size:1.05rem}.tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.6rem}.tag{padding:.38rem .7rem;border:1px solid color-mix(in srgb,var(--primary) 22%,transparent);border-radius:999px;background:var(--panel);color:var(--primary);font-size:.7rem;font-weight:600}
.portrait{min-height:430px;display:grid;place-items:center;border:1px solid color-mix(in srgb,var(--primary) 16%,transparent);border-radius:30px;background:linear-gradient(145deg,var(--panel),color-mix(in srgb,var(--accent) 16%,transparent));box-shadow:0 35px 100px color-mix(in srgb,var(--primary) 16%,transparent);overflow:hidden}.portrait img{width:100%;height:100%;min-height:430px;object-fit:cover}.initials{font-family:var(--serif);font-size:7rem;font-weight:900;color:var(--primary);opacity:.25}
.kpis{width:min(1120px,calc(100% - 36px));margin:0 auto 5rem;display:grid;grid-template-columns:repeat(3,1fr);border:1px solid color-mix(in srgb,var(--primary) 14%,transparent);background:var(--panel);backdrop-filter:blur(16px)}.kpi{padding:2rem;text-align:center;border-right:1px solid color-mix(in srgb,var(--primary) 14%,transparent)}.kpi:last-child{border-right:0}.kpi strong{display:block;color:var(--primary);font-family:var(--serif);font-size:2.5rem;line-height:1}.kpi span{color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.12em}
.article{width:min(900px,calc(100% - 36px));margin:auto;padding-bottom:6rem}.section{margin-bottom:1.2rem;padding:clamp(1.4rem,4vw,3rem);border:1px solid color-mix(in srgb,var(--primary) 12%,transparent);border-radius:24px;background:var(--panel);box-shadow:0 20px 60px color-mix(in srgb,var(--primary) 8%,transparent)}.section-num{color:var(--primary);font-size:.68rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase}.section h2{font-family:var(--serif);font-size:clamp(1.8rem,4vw,3rem);line-height:1.05;margin:.5rem 0 1rem}.section p{color:var(--muted);white-space:pre-line}.quote{margin-top:1.2rem;padding:1rem 1.2rem;border-left:3px solid var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent);font-family:var(--serif);font-size:1.15rem;font-style:italic}.footer{text-align:center;padding:3rem;color:var(--muted);font-size:.76rem}
@media(max-width:768px){.hero{grid-template-columns:minmax(0,1fr);min-height:auto;gap:2rem;padding:7rem 0 3rem}.hero>div{width:100%}.hero h1{max-width:100%;font-size:clamp(3rem,16vw,5.5rem);overflow-wrap:anywhere}.lede{max-width:100%;overflow-wrap:anywhere}.portrait,.portrait img{min-height:320px}.kpis{grid-template-columns:1fr}.kpi,.kpi:last-child{border-right:0;border-bottom:1px solid color-mix(in srgb,var(--primary) 14%,transparent)}.kpi:last-child{border-bottom:0}}@media(max-width:640px){.top{top:8px}.top a:last-child{font-size:.68rem}.hero,.kpis,.article{width:calc(100% - 20px)}.section{border-radius:18px}}
</style>
</head>
<body>
<nav class="top"><a class="brand" href="../index.html">Founder<span>Lens</span></a><a href="../founders.html">Founders</a></nav>
<header class="hero">
  <div><p class="eyebrow">{{eyebrow}}</p><h1>{{name}}<em>{{company}}</em></h1><p class="lede">{{tagline}}. {{summary}}</p><div class="tags">{{tags}}</div></div>
  <div class="portrait">{{image}}</div>
</header>
<section class="kpis">{{kpis}}</section>
<main class="article">{{sections}}</main>
<footer class="footer">Generated by FounderLens · Edit the JSON, not this HTML file.</footer>
</body>
</html>
