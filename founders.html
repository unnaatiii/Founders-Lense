      <div id="recentList"></div>

  <!-- MAIN -->

    <div class="divider"></div>

/* ═══════════════════════════════════════
   INDUSTRY CONFIG — add new industries here
   ═══════════════════════════════════════ */
const INDUSTRIES = [
  { key: "tech",       label: "Tech",        color: "#16213e" },
  { key: "finance",    label: "Finance",     color: "#1a3a5c" },
  { key: "retail",     label: "Retail",      color: "#7b3f00" },
  { key: "edtech",     label: "EdTech",      color: "#1e4d3a" },
  { key: "media",      label: "Media",       color: "#4a1942" },
  { key: "healthcare", label: "Healthcare",  color: "#1b3a4b" },
  { key: "fmcg",       label: "FMCG",        color: "#5a3e00" },
  { key: "real-estate",label: "Real Estate", color: "#3b1f00" },
  { key: "foodtech",   label: "Food-Tech",    color: "#3b1f00" },
  { key: "quickcommerce", label: "Quick Commerce",    color: "#3b1f00" },
];

/* ─── state ─── */
let activeFilter = 'all';
let searchQuery = '';

/* ─── init ─── */
buildSidebar();
buildIndustryGrid();
renderGrid();
renderRecent();

/* ─── sidebar ─── */
function buildSidebar() {
  const el = document.getElementById('sidebarIndustry');
  el.innerHTML = INDUSTRIES.map(ind => `
    <a class="aside-link" onclick="filterBy('${ind.key}',this)">${ind.label}</a>
  `).join('');
}

/* ─── grid ─── */
function renderGrid() {
  const grid = document.getElementById('foundersGrid');
  let list = [...FOUNDERS];

  if (activeFilter === 'recent') {
    list.sort((a,b) => new Date(b.added) - new Date(a.added));
    list = list.slice(0, 6);
  } else if (activeFilter !== 'all') {
    list = list.filter(f =>
      f.industry === activeFilter || f.tags.includes(activeFilter)
    );
  }

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    list = list.filter(f =>
      f.name.toLowerCase().includes(q) ||
      f.company.toLowerCase().includes(q) ||
      f.tagline.toLowerCase().includes(q) ||
      f.industry.toLowerCase().includes(q)
    );
  }

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No founders found. Try a different filter or search.</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(f => `
    <a class="founder-card" href="${f.file}" target="_blank" rel="noopener noreferrer" title="${f.name} — ${f.company}">
      <div class="fc-bg" style="background:${f.color}">
        <div class="fc-initials" style="color:${f.textColor};opacity:0.2;font-size:4rem">${f.initials}</div>
        <div class="fc-overlay"></div>
      </div>
      <div class="fc-info">
        <p class="fc-label">${labelForIndustry(f.industry)}</p>
        <p class="fc-name">${f.name}</p>
        <p class="fc-company">${f.company}</p>
      </div>
    </a>
  `).join('');
}

function labelForIndustry(key) {
  const ind = INDUSTRIES.find(i => i.key === key);
  return ind ? ind.label : key;
}

/* ─── filters ─── */
function filterBy(key, el) {
  activeFilter = key;
  document.querySelectorAll('.aside-link').forEach(l => l.classList.remove('active'));
  if (el) el.classList.add('active');

  const labels = { all:'All Founders', recent:'Recently Added' };
  const ind = INDUSTRIES.find(i => i.key === key);
  const strat = {
    'bootstrapped':'Bootstrapped','vc-backed':'VC-Backed','d2c':'D2C Marketing',
    'network-effects':'Network Effects','platform':'Platform Model','disruptor':'Disruptors'
  };

  document.getElementById('mainTag').textContent =
    ind ? 'Industry' : (strat[key] ? 'Strategy' : 'Browse');
  document.getElementById('mainTitle').textContent =
    (ind ? ind.label : (strat[key] || labels[key] || key)).toUpperCase();

  renderGrid();
}

/* ─── search overlay ─── */
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(() => document.getElementById('searchInput').focus(), 50);
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  renderRecent();
}
function handleOverlayClick(e) {
  if (!document.getElementById('searchBox').contains(e.target)) closeSearch();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

function onSearchInput() {
  searchQuery = document.getElementById('searchInput').value;
  if (searchQuery.trim()) {
    showSearchResults(searchQuery);
  } else {
    renderRecent();
    document.getElementById('recentList').style.display = '';
    document.getElementById('industryGrid').style.display = '';
    document.querySelectorAll('.search-section-label').forEach(l => l.style.display = '');
  }
}

function onSearchKey(e) {
  if (e.key === 'Enter' && searchQuery.trim()) {
    closeSearch();
    renderGrid();
  }
}

function showSearchResults(q) {
  const ql = q.toLowerCase();
  const matches = FOUNDERS.filter(f =>
    f.name.toLowerCase().includes(ql) ||
    f.company.toLowerCase().includes(ql) ||
    f.tagline.toLowerCase().includes(ql)
  );

  const res = document.getElementById('searchResults');
  const sections = res.querySelectorAll('.search-section-label');
  const recentList = document.getElementById('recentList');
  const indGrid = document.getElementById('industryGrid');

  sections.forEach(s => s.style.display = 'none');
  recentList.style.display = 'none';
  indGrid.style.display = 'none';

  // remove old result rows
  res.querySelectorAll('.dyn-result').forEach(el => el.remove());

  if (matches.length === 0) {
    const none = document.createElement('p');
    none.className = 'dyn-result';
    none.style.cssText = 'padding:1.5rem 1.25rem;color:var(--ink-3);font-size:0.875rem;';
    none.textContent = 'No founders found for "' + q + '"';
    res.appendChild(none);
    return;
  }

  matches.forEach(f => {
    const ind = INDUSTRIES.find(i => i.key === f.industry);
    const a = document.createElement('a');
    a.className = 'search-item dyn-result';
    a.href = f.file;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="si-thumb" style="background:${f.color}">${f.initials}</div>
      <div class="si-info">
        <p class="si-name">${f.name}</p>
        <p class="si-meta">${f.company}</p>
      </div>
      <span class="si-tag">${ind ? ind.label : f.industry}</span>
    `;
    res.appendChild(a);
  });
}

/* ─── recent list in search ─── */
function renderRecent() {
  const recent = [...FOUNDERS].sort((a,b) => new Date(b.added)-new Date(a.added)).slice(0,4);
  document.getElementById('recentList').innerHTML = recent.map(f => {
    const ind = INDUSTRIES.find(i => i.key === f.industry);
    return `<a class="search-item" href="${f.file}" target="_blank" rel="noopener noreferrer">
      <div class="si-thumb" style="background:${f.color}">${f.initials}</div>
      <div class="si-info">
        <p class="si-name">${f.name}</p>
        <p class="si-meta">${f.company}</p>
      </div>
      <span class="si-tag">${ind ? ind.label : f.industry}</span>
    </a>`;
  }).join('');
}

/* ─── industry grid in search ─── */
function buildIndustryGrid() {
  document.getElementById('industryGrid').innerHTML = INDUSTRIES.map(ind => `
    <button class="ind-chip" onclick="closeSearch();filterBy('${ind.key}',null)">${ind.label}</button>
  `).join('');
}
</script>
