<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Founders — FounderLens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
:root {
  --founder-bg: #f7fbf5;
  --founder-ink: #10261d;
  --founder-muted: #557064;
  --founder-soft: rgba(255,255,255,0.68);
  --founder-line: rgba(20,83,45,0.14);
  --founder-accent: #047857;
  --founder-gold: #b8892f;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(circle at 18% 12%, rgba(74,222,128,0.28), transparent 28vw),
    radial-gradient(circle at 82% 18%, rgba(184,137,47,0.18), transparent 30vw),
    linear-gradient(180deg, #fbfff8 0%, #edf8ef 46%, #f8fbf5 100%);
  color: var(--founder-ink);
  overflow-x: hidden;
}

html,
body {
  overflow-y: auto;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.38;
  background-image:
    linear-gradient(rgba(4,120,87,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(4,120,87,0.035) 1px, transparent 1px);
  background-size: 82px 82px;
  mask-image: radial-gradient(circle at center, black 0%, transparent 76%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 999;
  pointer-events: none;
  opacity: 0.07;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.64'/%3E%3C/svg%3E");
  mix-blend-mode: soft-light;
}

.founder-ambient {
  position: fixed;
  inset: -18vh -10vw;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.founder-wash {
  position: absolute;
  width: 54vw;
  height: 54vw;
  border-radius: 999px;
  filter: blur(80px);
  opacity: 0.24;
  animation: founderDrift 16s ease-in-out infinite alternate;
}
.founder-wash.one { top: -24vw; left: -14vw; background: radial-gradient(circle, rgba(74,222,128,0.62), transparent 66%); }
.founder-wash.two { top: 12vh; right: -22vw; background: radial-gradient(circle, rgba(184,137,47,0.34), transparent 66%); animation-duration: 19s; }
.founder-wash.three { bottom: -34vw; left: 34vw; background: radial-gradient(circle, rgba(16,185,129,0.24), transparent 66%); animation-duration: 22s; }
@keyframes founderDrift { to { transform: translate3d(72px, 48px, 0) scale(1.08); } }

body > nav {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: min(1120px, calc(100vw - 32px));
  height: auto;
  z-index: 500;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 1rem;
  padding: 0.72rem 0.82rem;
  border: 1px solid var(--founder-line);
  border-radius: 999px;
  background: rgba(247,251,245,0.74);
  backdrop-filter: blur(18px);
  box-shadow: 0 24px 80px rgba(20,83,45,0.12);
  transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
}
body > nav.is-scrolled {
  background: rgba(247,251,245,0.94);
  border-color: rgba(20,83,45,0.2);
  box-shadow: 0 28px 90px rgba(20,83,45,0.18);
}
.logo {
  padding-left: 0.8rem;
  color: var(--founder-ink);
  font-size: 1.05rem;
}
.logo span { color: var(--founder-accent); }
.nav-search-btn {
  min-width: min(350px, 34vw);
  max-width: none;
  flex: initial;
  justify-content: center;
  border-radius: 999px;
  border-color: rgba(4,120,87,0.16);
  color: #345d4d;
  background: rgba(255,255,255,0.56);
  cursor: pointer;
  transition: border-color 0.25s ease, background 0.25s ease, color 0.25s ease;
}
.nav-search-btn:hover {
  background: rgba(255,255,255,0.82);
  border-color: rgba(4,120,87,0.38);
  color: var(--founder-ink);
}
.nav-right {
  justify-self: end;
  margin-left: 0;
  align-items: center;
}
.nav-btn {
  border-radius: 999px;
  border: 0;
  color: rgba(16,38,29,0.68);
  background: transparent;
  padding: 0.55rem 0.75rem;
  font-size: 0.82rem;
}
.nav-btn:hover,
.nav-btn.active {
  color: #fff;
  background: var(--founder-accent);
}
.nav-btn.home {
  background: var(--founder-accent);
  color: #fff;
  border-color: transparent;
}

.founder-hero {
  position: relative;
  z-index: 1;
  min-height: 82svh;
  display: grid;
  place-items: center;
  padding: 9rem 1.25rem 5rem;
  overflow: hidden;
}
.founder-hero::before {
  content: "";
  position: absolute;
  inset: 16vh 8vw 7vh;
  z-index: -2;
  border: 1px solid var(--founder-line);
  border-radius: 30px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.74), rgba(226,245,232,0.25)),
    url("https://images.unsplash.com/photo-1556761175-b413da4baf72?auto=format&fit=crop&w=1800&q=80") center/cover;
  background-blend-mode: screen;
  filter: grayscale(0.18);
  box-shadow: inset 0 0 120px rgba(255,255,255,0.55), 0 70px 170px rgba(20,83,45,0.16);
}
.founder-hero-inner {
  width: min(1180px, 100%);
  text-align: center;
}
.founder-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.7rem;
  margin-bottom: 1.3rem;
  color: var(--founder-accent);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.founder-eyebrow::before,
.founder-eyebrow::after {
  content: "";
  width: 44px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(4,120,87,0.62));
}
.founder-eyebrow::after { background: linear-gradient(90deg, rgba(4,120,87,0.62), transparent); }
.founder-hero h1 {
  font-family: var(--serif);
  font-size: clamp(4.5rem, 14vw, 14rem);
  font-weight: 900;
  line-height: 0.78;
  letter-spacing: -0.075em;
  text-transform: uppercase;
  color: var(--founder-ink);
  text-shadow: 0 20px 70px rgba(4,120,87,0.12);
}
.founder-microtext {
  margin-top: 1.9rem;
  color: var(--founder-muted);
  font-size: clamp(0.72rem, 1.2vw, 0.9rem);
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}
.founder-copy {
  max-width: 690px;
  margin: 1.55rem auto 0;
  color: var(--founder-muted);
  font-size: clamp(1rem, 1.7vw, 1.22rem);
  font-weight: 300;
}

.shell {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: minmax(210px, 250px) minmax(0, 1fr);
  width: min(1220px, calc(100vw - 36px));
  margin: 0 auto 5rem;
  min-height: 0;
  gap: 1rem;
}
aside {
  width: auto;
  height: fit-content;
  max-height: calc(100vh - 120px);
  top: 96px;
  padding: 1rem;
  border: 1px solid var(--founder-line);
  border-radius: 18px;
  background: rgba(255,255,255,0.56);
  backdrop-filter: blur(18px);
  box-shadow: 0 24px 70px rgba(20,83,45,0.1);
}
.aside-label {
  color: rgba(16,38,29,0.48);
}
.aside-link {
  border-radius: 999px;
  border-left: 0;
  color: #355d4d;
  padding: 0.48rem 0.8rem;
}
.aside-link:hover,
.aside-link.active {
  color: #fff;
  background: var(--founder-accent);
}
main {
  padding: 0;
}
.main-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 2rem;
  padding: 1.5rem 0 1rem;
}
.main-tag {
  color: var(--founder-accent);
}
.main-title {
  color: var(--founder-ink);
  font-size: clamp(2.6rem, 7vw, 6.4rem);
  letter-spacing: -0.06em;
}
.divider {
  background: var(--founder-line);
}
.founders-grid {
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1rem;
}
  .founder-card {
    min-height: 310px;
  aspect-ratio: auto;
  border-radius: 8px;
  border: 1px solid var(--founder-line);
  background: rgba(255,255,255,0.62);
  box-shadow: 0 24px 70px rgba(20,83,45,0.1);
  backdrop-filter: blur(14px);
}
.founder-card:hover {
  transform: translateY(-8px) scale(1.015);
  border-color: rgba(4,120,87,0.34);
  box-shadow: 0 34px 90px rgba(20,83,45,0.18);
}
  .fc-bg {
    height: 100%;
    background:
      linear-gradient(150deg, rgba(255,255,255,0.72), rgba(223,244,230,0.28)),
      var(--card-color, #e9f7ed) !important;
}
.fc-initials {
  opacity: 0.2 !important;
  filter: saturate(0.85);
}
.fc-overlay {
  background: linear-gradient(to top, rgba(16,38,29,0.82) 0%, rgba(16,38,29,0.05) 58%);
}
.fc-label {
  color: rgba(255,255,255,0.7);
}
.fc-name {
  color: #fff;
  letter-spacing: -0.03em;
}
.fc-company {
  color: rgba(255,255,255,0.68);
}

.search-overlay {
  background: rgba(8,40,28,0.2);
  backdrop-filter: blur(20px);
}
.search-box {
  border: 1px solid var(--founder-line);
  border-radius: 20px;
  background: rgba(251,255,248,0.94);
  box-shadow: 0 34px 110px rgba(20,83,45,0.2);
}
.search-input-row {
  border-bottom-color: var(--founder-line);
}
.search-real-input {
  color: var(--founder-ink);
}
.search-close {
  border-color: var(--founder-line);
  color: var(--founder-muted);
  background: rgba(255,255,255,0.62);
}
.search-section-label,
.si-meta {
  color: var(--founder-muted);
}
.search-item {
  border-radius: 14px;
  margin: 0.22rem 0.55rem;
}
.search-item:hover {
  background: rgba(220,252,231,0.62);
}
.si-name {
  color: var(--founder-ink);
}
.si-tag {
  color: var(--founder-accent);
  border-color: rgba(4,120,87,0.18);
  background: rgba(220,252,231,0.46);
}
.ind-chip {
  border-radius: 999px;
  border-color: var(--founder-line);
  color: #345d4d;
  background: rgba(255,255,255,0.58);
}
.ind-chip:hover {
  background: var(--founder-accent);
  color: #fff;
}

@media (max-width: 980px) {
  body > nav { grid-template-columns: 1fr auto; border-radius: 24px; }
  .nav-search-btn { order: 3; grid-column: 1 / -1; width: 100%; min-width: 0; }
  .shell { grid-template-columns: 1fr; }
  aside {
    position: relative;
    top: auto;
    max-height: none;
  }
}

@media (max-width: 700px) {
  body > nav { top: 10px; width: calc(100vw - 20px); }
  .nav-right .nav-btn:not(.home) { display: none; }
  .founder-hero { min-height: 70svh; padding-top: 10rem; }
  .founder-hero::before { inset: 18vh 1rem 4vh; border-radius: 20px; }
  .main-header { display: block; }
  aside { display: block; }
  .founders-grid { grid-template-columns: 1fr; }
}

/* Founder page alternate theme: light editorial violet */
:root {
  --founder-bg: #fbf8ff;
  --founder-ink: #251735;
  --founder-muted: #6f607d;
  --founder-soft: rgba(255,255,255,0.7);
  --founder-line: rgba(91,33,182,0.13);
  --founder-accent: #7c3aed;
  --founder-gold: #b8862f;
}

body {
  background:
    radial-gradient(circle at 16% 12%, rgba(196,181,253,0.46), transparent 28vw),
    radial-gradient(circle at 82% 18%, rgba(251,191,36,0.2), transparent 30vw),
    linear-gradient(180deg, #fffafe 0%, #f3edff 46%, #fffaf4 100%);
  color: var(--founder-ink);
}

body::before {
  background-image:
    linear-gradient(rgba(91,33,182,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(91,33,182,0.035) 1px, transparent 1px);
}

.founder-wash.one { background: radial-gradient(circle, rgba(196,181,253,0.72), transparent 66%); }
.founder-wash.two { background: radial-gradient(circle, rgba(251,191,36,0.34), transparent 66%); }
.founder-wash.three { background: radial-gradient(circle, rgba(167,139,250,0.28), transparent 66%); }

.logo span,
.founder-eyebrow,
.main-tag,
.section-label,
.si-tag {
  color: var(--founder-accent);
}

.nav-btn:hover,
.nav-btn.active,
.nav-btn.home,
.aside-link:hover,
.aside-link.active,
.ind-chip:hover {
  background: var(--founder-accent);
}

.founder-hero {
  min-height: 72svh;
}
.founder-hero::before {
  inset: 15vh 8vw 5vh;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.76), rgba(242,232,255,0.3)),
    url("https://images.unsplash.com/photo-1519389950473-47ba0277781c?auto=format&fit=crop&w=1800&q=80") center/cover;
  background-blend-mode: screen;
  box-shadow: inset 0 0 120px rgba(255,255,255,0.58), 0 64px 150px rgba(91,33,182,0.14);
}
.founder-eyebrow::before { background: linear-gradient(90deg, transparent, rgba(124,58,237,0.58)); }
.founder-eyebrow::after { background: linear-gradient(90deg, rgba(124,58,237,0.58), transparent); }
.founder-hero h1 {
  text-shadow: 0 20px 70px rgba(91,33,182,0.14);
}

.shell {
  grid-template-columns: minmax(210px, 240px) minmax(0, 1fr);
}
.founders-grid {
  grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
  gap: 0.85rem;
}
.founder-card {
  min-height: 218px;
  aspect-ratio: 4 / 5;
  animation: founderCardIn 0.72s cubic-bezier(.2,.8,.2,1) both;
}
.founder-card:nth-child(2n) { animation-delay: 0.04s; }
.founder-card:nth-child(3n) { animation-delay: 0.08s; }
.founder-card:nth-child(4n) { animation-delay: 0.12s; }
.fc-initials {
  font-size: 3.35rem !important;
}
.fc-info {
  padding: 0.72rem 0.78rem;
}
.fc-name {
  font-size: 0.98rem;
}
.fc-company {
  font-size: 0.68rem;
}

.founder-card {
  isolation: isolate;
}
.founder-card-track {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr 0.82fr;
  width: 182%;
  transform: translateX(0);
  transition: transform 0.55s cubic-bezier(.2,.8,.2,1);
}
.founder-copy-panel,
.founder-image-panel {
  position: relative;
  min-width: 0;
  overflow: hidden;
}
.founder-copy-panel {
  background:
    linear-gradient(150deg, rgba(255,255,255,0.76), rgba(242,232,255,0.28)),
    var(--card-color, #ede9fe);
}
.founder-copy-panel .fc-info {
  position: absolute;
  inset: auto 0 0;
}
.founder-image-panel {
  display: grid;
  place-items: center;
  background:
    linear-gradient(145deg, rgba(37,23,53,0.18), rgba(255,255,255,0.12)),
    var(--card-color, #ede9fe);
}
.founder-image-panel::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 24%, rgba(255,255,255,0.35), transparent 58%);
}
.founder-card-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(0.16) contrast(1.04);
  transform: scale(1.06);
  transition: transform 0.55s cubic-bezier(.2,.8,.2,1);
}
.founder-image-fallback {
  position: relative;
  z-index: 1;
  font-family: var(--serif);
  font-size: clamp(3rem, 7vw, 5.8rem);
  font-weight: 900;
  line-height: 1;
  color: rgba(255,255,255,0.82);
  text-shadow: 0 18px 50px rgba(0,0,0,0.18);
}
.founder-image-panel .fc-overlay {
  opacity: 0.55;
}
.founder-card:hover .founder-card-track {
  transform: translateX(-45%);
}
.founder-card:hover .founder-card-image {
  transform: scale(1.12);
}

.founder-ambient {
  animation: founderAmbientPulse 12s ease-in-out infinite alternate;
}
body > nav {
  animation: founderNavDrop 0.8s cubic-bezier(.2,.8,.2,1) both;
}

@keyframes founderNavDrop {
  from { opacity: 0; transform: translate(-50%, -16px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}
@keyframes founderHeroIn {
  from { opacity: 0; transform: translateY(34px) scale(0.985); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes founderMicroFloat {
  from { opacity: 0.68; transform: translateY(0); }
  to { opacity: 1; transform: translateY(-7px); }
}
@keyframes founderCardIn {
  from { opacity: 0; transform: translateY(28px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes founderAmbientPulse {
  from { transform: scale(1); }
  to { transform: scale(1.035); }
}

@media (max-width: 700px) {
  .shell { margin-top: 8rem; }
  .founders-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .founder-card {
    min-height: 190px;
  }
}

/* Removed oversized hero; the founder library is the first experience. */
.founder-hero {
  display: none;
}
.shell {
  margin-top: 8.5rem;
}

/* Shared page rhythm aligned with About */
body > nav {
  width: min(960px, calc(100vw - 32px));
}
.shell {
  width: min(1180px, calc(100vw - 36px));
  grid-template-columns: minmax(210px, 240px) minmax(0, 1fr);
  gap: 1rem;
}
.main-header {
  padding-top: 0;
  padding-bottom: 1rem;
}
.main-title {
  font-size: clamp(2.2rem, 5.2vw, 5.6rem);
  line-height: 0.95;
  letter-spacing: -0.055em;
}
.founders-grid {
  grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
  gap: 0.85rem;
}
.founder-card {
  min-height: 218px;
}
@media (max-width: 900px) {
  .shell {
    grid-template-columns: 1fr;
  }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>

<div class="founder-ambient" aria-hidden="true">
  <div class="founder-wash one"></div>
  <div class="founder-wash two"></div>
  <div class="founder-wash three"></div>
</div>

<!-- NAV -->
<nav id="founderNav">
  <a class="logo" href="index.html">Founder<span>Lens</span></a>
  <button class="nav-search-btn" onclick="openSearch()">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
    Search founders…
  </button>
  <div class="nav-right">
    <a class="nav-btn home" href="index.html">Home</a>
    <a class="nav-btn active" href="founders.html">Founders</a>
    <a class="nav-btn" href="company.html">Companies</a>
    <a class="nav-btn" href="about.html">About</a>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay" onclick="handleOverlayClick(event)">
  <div class="search-box" id="searchBox">
    <div class="search-input-row">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-real-input" id="searchInput" type="text" placeholder="Search founders or companies…" oninput="onSearchInput()" onkeydown="onSearchKey(event)">
      <button class="search-close" onclick="closeSearch()">ESC</button>
    </div>
    <div class="search-results" id="searchResults">
      <!-- default state -->
      <p class="search-section-label">Recent Additions</p>
      <div id="recentList"></div>
      <p class="search-section-label">Browse by Industry</p>
      <div class="search-industry-grid" id="industryGrid"></div>
    </div>
  </div>
</div>

<!-- SHELL -->
<div class="shell">

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="aside-section">
      <p class="aside-label">Browse</p>
      <a class="aside-link active" onclick="filterBy('all',this)">All Founders</a>
      <a class="aside-link" onclick="filterBy('recent',this)">Recently Added</a>
    </div>
    <div class="aside-section">
      <p class="aside-label">Industry</p>
      <div id="sidebarIndustry"></div>
    </div>
    <div class="aside-section">
      <p class="aside-label">Strategy</p>
      <a class="aside-link" onclick="filterBy('bootstrapped',this)">Bootstrapped</a>
      <a class="aside-link" onclick="filterBy('vc-backed',this)">VC-Backed</a>

/* ═══════════════════════════════════════
   INDUSTRY CONFIG — add new industries here
   ═══════════════════════════════════════ */
const INDUSTRIES = [
  { key: "tech",       label: "Tech",        color: "#16213e" },
  { key: "finance",    label: "Finance",     color: "#1a3a5c" },
  { key: "retail",     label: "Retail",      color: "#7b3f00" },
  { key: "edtech",     label: "EdTech",      color: "#1e4d3a" },
  { key: "media",      label: "Media",       color: "#4a1942" },
  { key: "healthcare", label: "Healthcare",  color: "#1b3a4b" },
  { key: "fmcg",       label: "FMCG",        color: "#5a3e00" },
  { key: "real-estate",label: "Real Estate", color: "#3b1f00" },
  { key: "foodtech",   label: "Food-Tech",    color: "#3b1f00" },
  { key: "quickcommerce", label: "Quick Commerce",    color: "#3b1f00" },
];

/* ─── state ─── */
let activeFilter = 'all';
let searchQuery = '';

/* ─── init ─── */
buildSidebar();
buildIndustryGrid();
renderGrid();
renderRecent();
initFounderMotion();

/* ─── sidebar ─── */
function buildSidebar() {
  const el = document.getElementById('sidebarIndustry');
  el.innerHTML = INDUSTRIES.map(ind => `
    <a class="aside-link" onclick="filterBy('${ind.key}',this)">${ind.label}</a>
  `).join('');
}

/* ─── grid ─── */
function renderGrid() {
  const grid = document.getElementById('foundersGrid');
  let list = [...FOUNDERS];

  if (activeFilter === 'recent') {
    list.sort((a,b) => new Date(b.added) - new Date(a.added));
    list = list.slice(0, 6);
  } else if (activeFilter !== 'all') {
    list = list.filter(f =>
      f.industry === activeFilter || f.tags.includes(activeFilter)
    );
  }

  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    list = list.filter(f =>
      f.name.toLowerCase().includes(q) ||
      f.company.toLowerCase().includes(q) ||
      f.tagline.toLowerCase().includes(q) ||
      f.industry.toLowerCase().includes(q)
    );
  }

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
      <p>No founders found. Try a different filter or search.</p>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(f => `
    <a class="founder-card" href="${f.file}" target="_blank" rel="noopener noreferrer" title="${f.name} — ${f.company}">
      <div class="founder-card-track" style="--card-color:${f.color}">
        <div class="founder-copy-panel">
          <div class="fc-bg" style="--card-color:${f.color};background:${f.color}">
            <div class="fc-initials" style="color:${f.textColor};opacity:0.2;font-size:4rem">${f.initials}</div>
            <div class="fc-overlay"></div>
          </div>
          <div class="fc-info">
            <p class="fc-label">${labelForIndustry(f.industry)}</p>
            <p class="fc-name">${f.name}</p>
            <p class="fc-company">${f.company}</p>
          </div>
        </div>
        <div class="founder-image-panel">
          ${founderVisual(f)}
          <div class="fc-overlay"></div>
        </div>
      </div>
    </a>
  `).join('');
  animateFounderCards();
}

function founderVisual(f) {
  const src = f.image || f.photo || f.avatar || '';
  if (!src) return `<span class="founder-image-fallback">${f.initials}</span>`;
  return `<img class="founder-card-image" src="${src}" alt="${f.name}">`;
}

function animateFounderCards() {
  if (!window.gsap || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  gsap.fromTo('.founder-card', { y: 26, opacity: 0, scale: 0.975 }, {
    y: 0,
    opacity: 1,
    scale: 1,
    duration: 0.62,
    stagger: 0.045,
    ease: 'power3.out',
    overwrite: true
  });
}

function initFounderMotion() {
  if (!window.gsap || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  gsap.registerPlugin(ScrollTrigger);

  gsap.from('.logo, .nav-search-btn, .nav-right a', {
    y: -12,
    opacity: 0,
    duration: 0.72,
    stagger: 0.05,
    ease: 'power3.out'
  });

  gsap.to('.founder-wash.one', { x: 80, y: 44, duration: 14, repeat: -1, yoyo: true, ease: 'sine.inOut' });
  gsap.to('.founder-wash.two', { x: -70, y: 64, duration: 17, repeat: -1, yoyo: true, ease: 'sine.inOut' });
  gsap.to('.founder-wash.three', { x: 64, y: -54, duration: 19, repeat: -1, yoyo: true, ease: 'sine.inOut' });

  gsap.from('aside, .main-header, .divider', {
    y: 42,
    opacity: 0,
    duration: 0.8,
    stagger: 0.08,
    ease: 'power3.out',
    scrollTrigger: { trigger: '.shell', start: 'top 78%' }
  });
}

function labelForIndustry(key) {
  const ind = INDUSTRIES.find(i => i.key === key);
  return ind ? ind.label : key;
}

/* ─── filters ─── */
function filterBy(key, el) {
  activeFilter = key;
  document.querySelectorAll('.aside-link').forEach(l => l.classList.remove('active'));
  if (el) el.classList.add('active');

  const labels = { all:'All Founders', recent:'Recently Added' };
  const ind = INDUSTRIES.find(i => i.key === key);
  const strat = {
    'bootstrapped':'Bootstrapped','vc-backed':'VC-Backed','d2c':'D2C Marketing',
    'network-effects':'Network Effects','platform':'Platform Model','disruptor':'Disruptors'
  };

  document.getElementById('mainTag').textContent =
    ind ? 'Industry' : (strat[key] ? 'Strategy' : 'Browse');
  document.getElementById('mainTitle').textContent =
    (ind ? ind.label : (strat[key] || labels[key] || key)).toUpperCase();

  renderGrid();
}

/* ─── search overlay ─── */
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(() => document.getElementById('searchInput').focus(), 50);
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  renderRecent();
}
function handleOverlayClick(e) {
  if (!document.getElementById('searchBox').contains(e.target)) closeSearch();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

function onSearchInput() {
  searchQuery = document.getElementById('searchInput').value;
  if (searchQuery.trim()) {
    showSearchResults(searchQuery);
  } else {
    renderRecent();
    document.getElementById('recentList').style.display = '';
    document.getElementById('industryGrid').style.display = '';
    document.querySelectorAll('.search-section-label').forEach(l => l.style.display = '');
  }
}

function onSearchKey(e) {
  if (e.key === 'Enter' && searchQuery.trim()) {
    closeSearch();
    renderGrid();
  }
}

function showSearchResults(q) {
  const ql = q.toLowerCase();
  const matches = FOUNDERS.filter(f =>
    f.name.toLowerCase().includes(ql) ||
    f.company.toLowerCase().includes(ql) ||
    f.tagline.toLowerCase().includes(ql)
  );

  const res = document.getElementById('searchResults');
  const sections = res.querySelectorAll('.search-section-label');
  const recentList = document.getElementById('recentList');
  const indGrid = document.getElementById('industryGrid');

  sections.forEach(s => s.style.display = 'none');
  recentList.style.display = 'none';
  indGrid.style.display = 'none';

  // remove old result rows
  res.querySelectorAll('.dyn-result').forEach(el => el.remove());

  if (matches.length === 0) {
    const none = document.createElement('p');
    none.className = 'dyn-result';
    none.style.cssText = 'padding:1.5rem 1.25rem;color:var(--ink-3);font-size:0.875rem;';
    none.textContent = 'No founders found for "' + q + '"';
    res.appendChild(none);
    return;
  }

  matches.forEach(f => {
    const ind = INDUSTRIES.find(i => i.key === f.industry);
    const a = document.createElement('a');
    a.className = 'search-item dyn-result';
    a.href = f.file;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `
      <div class="si-thumb" style="background:${f.color}">${f.initials}</div>
      <div class="si-info">
        <p class="si-name">${f.name}</p>
        <p class="si-meta">${f.company}</p>
      </div>
      <span class="si-tag">${ind ? ind.label : f.industry}</span>
    `;
    res.appendChild(a);
  });
}

/* ─── recent list in search ─── */
function renderRecent() {
  const recent = [...FOUNDERS].sort((a,b) => new Date(b.added)-new Date(a.added)).slice(0,4);
  document.getElementById('recentList').innerHTML = recent.map(f => {
    const ind = INDUSTRIES.find(i => i.key === f.industry);
    return `<a class="search-item" href="${f.file}" target="_blank" rel="noopener noreferrer">
      <div class="si-thumb" style="background:${f.color}">${f.initials}</div>
      <div class="si-info">
        <p class="si-name">${f.name}</p>
        <p class="si-meta">${f.company}</p>
      </div>
      <span class="si-tag">${ind ? ind.label : f.industry}</span>
    </a>`;
  }).join('');
}

/* ─── industry grid in search ─── */
function buildIndustryGrid() {
  document.getElementById('industryGrid').innerHTML = INDUSTRIES.map(ind => `
    <button class="ind-chip" onclick="closeSearch();filterBy('${ind.key}',null)">${ind.label}</button>
  `).join('');
}
